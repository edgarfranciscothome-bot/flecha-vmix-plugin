<!DOCTYPE html>
<html>
<head>
<style>
body { background:#1e1e1e; color:white; font-family:Arial; padding:10px; }
input,select { width:100%; margin:5px 0; padding:6px; border-radius:4px; border:none; }
h3 { margin-bottom:10px; }
</style>
</head>

<body>

<h3>FLECHA VMIX PRO</h3>

<label>IP</label>
<input id="ip" value="192.168.1.238">

<label>Porta</label>
<input id="port" value="8088">

<label>Função</label>
<select id="func">
<option value="Cut">Cut</option>
<option value="Fade">Fade</option>
<option value="PreviewInput">PreviewInput</option>
<option value="ActiveInput">ActiveInput</option>
<option value="StartStreaming">StartStreaming</option>
<option value="StopStreaming">StopStreaming</option>
<option value="StartRecording">StartRecording</option>
<option value="StopRecording">StopRecording</option>
<option value="AudioOn">AudioOn</option>
<option value="AudioOff">AudioOff</option>
</select>

<label>Input</label>
<input id="input">

<label>Value</label>
<input id="value">

<script src="pi.js"></script>
</body>
</html>
